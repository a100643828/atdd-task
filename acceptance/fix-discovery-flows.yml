# ───────────────────────────────────────────────────────────────────────────────

D13:
  id: "D13"
  name: "安全掃描"
  profile: "security"
  data_related: false
  description: "弱點掃描、滲透測試發現的安全問題"

  examples:
    - "XSS 漏洞"
    - "SQL injection"
    - "CSRF token 問題"
    - "敏感資料洩露"
    - "不安全的 dependency"

  flow: "Read Code → 分支(Dependency: 更新需人類確認 / Code: 定位漏洞) → (?) 修復 / 返回人類"

  tools_used:
    - read.local_codebase

  branches:
    dependency_issue:
      description: "不安全的 Dependency"
      action: "更新 dependency"
      constraint: "需要人類確認是否允許更新（修改 Gemfile/package.json）"
    code_vulnerability:
      description: "程式碼漏洞"
      types:
        xss:
          action: "加入 output escaping"
          affected_layer: "presentation"
        sql_injection:
          action: "改用 parameterized query"
          affected_layer: "infrastructure"
        csrf:
          action: "加入 CSRF token 檢查"
          affected_layer: "application"
        data_exposure:
          action: "移除敏感資料或加入存取控制"
          affected_layer: "application"

  possible_affected_layers:
    - presentation
    - application
    - infrastructure

  special_consideration:
    security_fix: |
      安全問題修復注意事項：
      1. 不要在修復 commit 中詳細描述漏洞細節
      2. 修復後需要安全審查（Review 階段處理）
      3. 如果是已被利用的漏洞，需要評估影響範圍
      4. 可能需要通知相關人員

# ═══════════════════════════════════════════════════════════════════════════════
# 共用定義
# ═══════════════════════════════════════════════════════════════════════════════

common:
  confidence_threshold:
    description: "信心度門檻"
    value: 95
    clear: "信心度 ≥ 95% → 進行修復"
    unclear: "信心度 < 95% → 返回人類"

  return_to_human:
    description: "返回人類時需提供的資訊"
    output:
      - "目前調查結果"
      - "已使用的工具和發現"
      - "已排除的可能性"
      - "無法釐清的具體問題"
      - "建議的下一步"

  flow_symbols:
    arrow: "→ 下一步"
    decision: "(?) 修復 如果釐清則修復"
    continue: "/ 否則繼續"
    ask: "詢問 需要人類確認"
    branch: "分支(...) 根據情況選擇"
    return: "返回人類 信心度不足時"

