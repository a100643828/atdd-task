    - "按鈕在某狀態應該 disable 但沒有"
    - "流程少了一個確認步驟"

  flow: "Browser → Read Spec → Read Code → (?) 修復 / Server Log → Domain Context → (?) 修復 / Git History → (?) 修復 / 返回人類"

  tools_used:
    - browser
    - read.local_codebase  # Read Spec + Read Code
    - aws_connect.server_log
    - read.domain_context
    - read.git_history

  possible_affected_layers:
    - presentation
    - application
    - domain

# ───────────────────────────────────────────────────────────────────────────────

D19:
  id: "D19"
  name: "跨瀏覽器/裝置問題"
  profile: "ui"
