# ═══════════════════════════════════════════════════════════════════════════════
# Data Profile
# ═══════════════════════════════════════════════════════════════════════════════

D4:
  id: "D4"
  name: "資料面錯誤"
  profile: "data"
  data_related: true
  description: "從報表或 Database 直接發現的資料錯誤（含 Redis 快取）"

  examples:
    - "報表數字加總不對"
    - "某筆資料狀態錯誤"
    - "資料應該存在但找不到"
    - "Redis 快取與 DB 不一致"

  flow: "Read Code → (?) 修復 / Rails Runner → Server Log → (?) 修復 / Domain Context → (?) 修復 / Migrate → Local 並發測試 → (?) 修復 / 返回人類"

  tools_used:
    - read.local_codebase
    - aws_connect.rails_runner
    - aws_connect.server_log
    - read.domain_context
    - migrate
    - bash.rails_runner

  possible_affected_layers:
    - domain
    - infrastructure

  special_consideration:
    data_fix: |
      如果確認是資料問題（不只是程式問題），需要：
      1. 修復程式碼防止再發生
      2. 評估是否需要修正現有資料
      3. 如需修正資料，必須：
         - 撰寫 migration script
         - 先在 Staging 測試
         - Production 執行需人類確認

# ───────────────────────────────────────────────────────────────────────────────

D14:
  id: "D14"
  name: "資料重複/遺失"
