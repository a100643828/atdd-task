# Fix Discovery Source Flows
#
# 用途：定義每個 Discovery Source (Dx) 的調查工具流程
# 原則：Tool 流程由 Discovery Source 決定，不是由 Profile 決定
#
# 結構：
#   - Discovery Source (Dx) → 決定調查工具流程
#   - Affected Layer (調查後確定) → 決定修復方式、測試類型
#   - Fix Profile (分類) → 用於統計、報表
#
# 流程符號說明：
#   - → : 下一步
#   - (?) 修復 : 如果釐清（信心度 ≥95%）則修復
#   - / : 否則繼續下一步
#   - 返回人類 : 信心度 <95%，將調查結果回報人類
#   - 詢問 : 需要人類確認才能執行

# ═══════════════════════════════════════════════════════════════════════════════
# UI Profile
# ═══════════════════════════════════════════════════════════════════════════════

D1:
  id: "D1"
  name: "頁面顯示錯誤（View Layer）"
  profile: "ui"
  data_related: false
  description: "純 View Layer 問題，如 CSS 跑版、Template 語法錯誤、前端 JS 錯誤"

  examples:
    - "按鈕樣式跑掉"
    - "文字顯示亂碼"
    - "RWD 在特定寬度壞掉"
    - "JS console 有錯誤"

  flow: "Browser → Read Code → (?) 修復 / Git History → (?) 修復 / 返回人類"

  tools_used:
    - browser
    - read.local_codebase
    - read.git_history

  possible_affected_layers:
    - presentation

# ───────────────────────────────────────────────────────────────────────────────

D2:
  id: "D2"
  name: "頁面顯示錯誤（資料相關）"
  profile: "ui"
  data_related: true
  description: "頁面顯示錯誤但根因在 Domain/Data Layer，如計算錯誤、資料缺失"

  examples:
    - "發票金額顯示 NaN"
    - "用戶名稱顯示 null"
    - "列表應該有資料但顯示空"
    - "狀態顯示與預期不符"

  flow: "Browser → Read Code → (?) 修復 / Server Log → (?) 修復 / Rails Runner → (?) 修復 / Domain Context → (?) 修復 / 詢問 Migrate → Local Debug → (?) 修復 / Git History → (?) 修復 / 返回人類"

  tools_used:
    - browser
    - read.local_codebase
    - aws_connect.server_log
    - aws_connect.rails_runner
    - read.domain_context
    - migrate
    - bash.rails_runner
    - debugger
    - read.git_history

  possible_affected_layers:
    - presentation
    - application
    - domain
    - infrastructure

# ───────────────────────────────────────────────────────────────────────────────

D3:
  id: "D3"
  name: "頁面流程錯誤"
  profile: "ui"
