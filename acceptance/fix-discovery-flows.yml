    - "並發更新導致資料被覆蓋"
    - "Unique constraint violation"
    - "資料莫名消失"

  flow: "Read Code → (?) 修復 / Rails Runner → (?) 修復 / Server Log → (?) 修復 / Domain Context → RDS/Redis Log → (?) 修復 / Migrate → Local 並發測試 → (?) 修復 / 返回人類"

  tools_used:
    - read.local_codebase
    - aws_connect.rails_runner
    - aws_connect.server_log
    - read.domain_context
    - aws_connect.rds_log
    - migrate
    - bash.rails_runner

  possible_affected_layers:
    - domain
    - infrastructure

