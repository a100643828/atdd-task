D10:
  id: "D10"
  name: "外部服務錯誤"
  profile: "integration"
  data_related: null
  description: "第三方 API、Webhook、Email、檔案存取等外部服務問題"

  examples:
    - "金流 API 回傳錯誤"
    - "ERP 同步失敗"
    - "Webhook 沒收到"
    - "Email 寄不出去"
    - "S3 上傳失敗"

  flow: "Error Tracking → Server Log → Read Code → (?) 修復 / 分支(Request 錯誤 / Response 處理錯誤 / 間歇性: Script 測試連線) → (?) 修復 / Domain Context → (?) 修復 / 返回人類"

  tools_used:
    - error_tracking
    - aws_connect.server_log
    - read.local_codebase
    - aws_connect.script
    - read.domain_context

  branches:
    request_wrong:
      description: "我方 Request 組成錯誤"
      affected_layer: "infrastructure"
    response_handling_wrong:
      description: "我方 Response 處理錯誤"
      affected_layer: "infrastructure"
    intermittent:
      description: "間歇性問題"
      tools:
        - aws_connect.script
      focus:
        - "connection_issue: 檢查網路/防火牆設定"
        - "timeout_issue: 調整 timeout 設定或加入重試機制"

  possible_affected_layers:
    - infrastructure

