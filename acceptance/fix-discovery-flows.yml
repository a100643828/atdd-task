# ═══════════════════════════════════════════════════════════════════════════════
# Performance Profile
# ═══════════════════════════════════════════════════════════════════════════════

D8:
  id: "D8"
  name: "APM 效能警報"
  profile: "performance"
  data_related: false
  description: "從 APM 監控發現的效能問題"

  examples:
    - "某 endpoint 回應時間超過閾值"
    - "N+1 query 警報"
    - "Memory 使用持續上升"
    - "Database time 過高"

  flow: "APM → Read Code → (?) 修復 / 分支(DB: RDS Log / Ruby: 分析邏輯 / External: Server Log / Memory: 分析邏輯) → (?) 修復 / Git History → (?) 修復 / 返回人類"

  tools_used:
    - apm
    - read.local_codebase
    - aws_connect.rds_log
    - aws_connect.server_log
    - read.git_history

  branches:
    db_time_high:
      description: "Database 時間過高"
      tools:
        - aws_connect.rds_log
      focus:
        - "加入 index"
        - "修改 query 寫法"
        - "加入 eager loading"
        - "加入 caching"
    ruby_time_high:
      description: "Ruby 執行時間過高"
      focus:
        - "迴圈效率"
        - "不必要的計算"
        - "可以 memoize 的地方"
    external_time_high:
      description: "外部服務時間過高"
      tools:
        - aws_connect.server_log
      focus:
        - "timeout/retry/async"
    memory_issue:
      description: "Memory 問題"
      focus:
        - "大量資料載入"
        - "未釋放的 reference"
        - "批次處理改為 find_each"

  possible_affected_layers:
    - application
    - domain
    - infrastructure

# ───────────────────────────────────────────────────────────────────────────────

D9:
  id: "D9"
  name: "用戶回報慢"
  profile: "performance"
  data_related: false
  description: "用戶反應效能問題但沒有明確監控警報"

  examples:
    - "用戶說頁面很慢"
    - "用戶說某功能 timeout"
    - "用戶說等很久"

  flow: "Browser → 分支(前端慢: DevTools / 後端慢: APM / 無法重現: Server Log) → Read Code → Local Benchmark → (?) 修復 / 返回人類"

  tools_used:
    - browser
    - apm
    - aws_connect.server_log
    - read.local_codebase
    - bash.benchmark

  branches:
    frontend_slow:
      description: "前端載入慢"
      tools:
        - browser  # DevTools
      focus:
        - "大檔案"
        - "過多請求"
        - "阻塞資源"
    backend_slow:
      description: "後端回應慢"
      tools:
        - apm
      note: "有 APM 數據時改用 D8 流程"
    cannot_reproduce:
      description: "無法重現"
      tools:
        - aws_connect.server_log
      note: "查看用戶操作時間點的 log"

  possible_affected_layers:
    - presentation
    - application
    - domain
    - infrastructure

