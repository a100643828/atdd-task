# Test Suites Index Template
#
# 用途：專案測試套件索引
# 位置：tests/{project_id}/index.yml
#
# 此檔案由 /test-list 自動維護，也可手動編輯

# ═══════════════════════════════════════════════════════════════════════════════
# 專案資訊
# ═══════════════════════════════════════════════════════════════════════════════
projectId: "{project_id}"
projectPath: "{project_path}"
updatedAt: "{ISO_timestamp}"

# ═══════════════════════════════════════════════════════════════════════════════
# 共用資源
# ═══════════════════════════════════════════════════════════════════════════════
shared:
  fixtures:
    - "users.yml"                     # 共用使用者資料
  helpers:
    - "login_helper.rb"               # 登入 helper

# ═══════════════════════════════════════════════════════════════════════════════
# 測試套件清單
# ═══════════════════════════════════════════════════════════════════════════════
suites:
  # 範例：
  # - id: "E2E-T0"
  #   title: "環境盤點"
  #   domain: null
  #   scenarios: 6
  #   lastRun: "2026-01-20"
  #   lastStatus: "passed"
  #   passRate: "100%"
  #
  # - id: "E2E-A1"
  #   title: "電費單 Happy Path"
  #   domain: "Accounting::ErpPeriod"
  #   scenarios: 16
  #   lastRun: "2026-01-21"
  #   lastStatus: "failed"
  #   passRate: "75%"
  #   requires:
  #     - "E2E-T0"

# ═══════════════════════════════════════════════════════════════════════════════
# 快速執行群組
# ═══════════════════════════════════════════════════════════════════════════════
groups:
  # 冒煙測試（快速驗證核心功能）
  smoke:
    description: "快速驗證核心功能"
    suites: []

  # 回歸測試（完整測試）
  regression:
    description: "完整回歸測試"
    suites: []

  # 特定 domain 測試
  # erp-period:
  #   description: "ERP 週期相關測試"
  #   suites:
  #     - "E2E-T0"
  #     - "E2E-A1"
  #     - "E2E-A2"
