events {
    worker_connections 64;
}

http {
    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name atdd.sunnyfounder.com;
        return 301 https://$host$request_uri;
    }

    # HTTPS — Dev API endpoint (Phase 4+)
    server {
        listen 443 ssl;
        server_name atdd.sunnyfounder.com;

        ssl_certificate     /etc/letsencrypt/live/atdd.sunnyfounder.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/atdd.sunnyfounder.com/privkey.pem;

        # Health check
        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # Dev API (Phase 4+)
        location /api/ {
            return 503 '{"error":"not yet implemented"}';
            add_header Content-Type application/json;
        }
    }
}
